<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Mission Optimizer</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div>
        <h1>Farm Mission Optimizer</h1>
        <p class="tagline">Starter web version for your CIFI tool</p>
      </div>
      <nav>
        <a href="../../index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Inputs</h2>
      <p class="muted">
        This starter gives you a browser UI and a place to port your optimiser logic.
        The demo button uses simple placeholder logic so you can confirm the site is wired correctly.
      </p>

      <div class="grid-4">
        <div>
          <label for="miningPods">Mining Pods</label>
          <input id="miningPods" type="number" value="3274" min="0" />
        </div>
        <div>
          <label for="fireteams">Fireteam Carriers</label>
          <input id="fireteams" type="number" value="1852" min="0" />
        </div>
        <div>
          <label for="titans">Titan Haulers</label>
          <input id="titans" type="number" value="994" min="0" />
        </div>
        <div>
          <label for="corvettes">Combat Corvettes</label>
          <input id="corvettes" type="number" value="575" min="0" />
        </div>
      </div>

      <div class="grid-2" style="margin-top:14px;">
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option>Fragments + Resources</option>
            <option>Fragments</option>
            <option>Maximising Resources</option>
            <option>Academy Points</option>
            <option>Max Completions</option>
          </select>
        </div>
        <div>
          <label for="campaignEnabled">Campaign enabled</label>
          <select id="campaignEnabled">
            <option value="false">False</option>
            <option value="true">True</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px;">
        <label for="notes">Notes / future mission data area</label>
        <textarea id="notes">Later, this is where you can load mission data from JSON or another file and replace the demo logic with your real optimiser.</textarea>
      </div>

      <div class="actions">
        <button id="runDemo">Run demo</button>
        <button id="clearOutput" class="secondary">Clear output</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="card" style="margin-top:18px;">
      <h2>Results</h2>
      <div id="results" class="result-box">No results yet.</div>
    </section>
  </main>

  <script src="js/mission-optimizer.js"></script>
</body>
</html>
